<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Flat-top hex, Catan-red fill, brown outline -->
  <polygon points="50,6 91,28 91,72 50,94 9,72 9,28"
           fill="#ac2c07" stroke="#5d462a" stroke-width="6" stroke-linejoin="round" />
  <!-- Cream number-token disc -->
  <circle cx="50" cy="50" r="22" fill="#f4e4bc" stroke="#5d462a" stroke-width="4" />
  <!-- "8" in red (high-yield token, recognizable at a glance) -->
  <text x="50" y="50" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, serif" font-weight="900" font-size="32" fill="#c0341d">8</text>
</svg>
